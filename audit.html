<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audit Log - CyberCheck</title>
  <link rel="stylesheet" href="../../packages/css/core.css">
  <style>
    body{background:#f5f7fa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Roboto',sans-serif}
    .container{max-width:1400px;margin:0 auto;padding:32px 24px}
    h1{font-size:32px;margin-bottom:24px}
    .filters{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
    .filter-select{padding:10px 16px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;background:#fff}
    .log-table{background:#fff;border-radius:12px;border:2px solid #e0e0e0;overflow:hidden}
    .table-header{display:grid;grid-template-columns:180px 120px 200px 1fr 120px;gap:16px;padding:16px 24px;background:#f5f7fa;font-weight:600;font-size:14px;color:#666}
    .log-row{display:grid;grid-template-columns:180px 120px 200px 1fr 120px;gap:16px;padding:20px 24px;border-top:1px solid #e0e0e0;align-items:center}
    .log-row:hover{background:#f9fafb}
    .status-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:16px;font-size:12px;font-weight:600}
    .status-badge.success{background:#d1fae5;color:#059669}
    .status-badge.failed{background:#fee2e2;color:#dc2626}
    .time{color:#666;font-size:14px}
    .app-name{font-weight:600;color:#667eea}
    .action-name{font-size:14px;color:#1a1a1a}
    .empty{text-align:center;padding:60px 20px;color:#666}
  </style>
</head>
<body>
<script src="../../packages/ui-kit/components/universal-nav.html"></script>
  <script src="../../packages/ui-kit/components/hamburger-nav.html"></script>

  <div class="container saas-content">
    <h1>📋 Audit Log</h1>
    
    <div class="filters">
      <select class="filter-select" id="appFilter" onchange="filterLogs()">
        <option value="">All Apps</option>
        <option value="crm">CRM</option>
        <option value="messaging">Messaging</option>
        <option value="booking">Booking</option>
      </select>
      
      <select class="filter-select" id="statusFilter" onchange="filterLogs()">
        <option value="">All Statuses</option>
        <option value="success">Success</option>
        <option value="failed">Failed</option>
      </select>

      <select class="filter-select" id="limitFilter" onchange="filterLogs()">
        <option value="50">Last 50</option>
        <option value="100">Last 100</option>
        <option value="200">Last 200</option>
      </select>
    </div>

    <div class="log-table">
      <div class="table-header">
        <div>Date & Time</div>
        <div>App</div>
        <div>Action</div>
        <div>Details</div>
        <div>Status</div>
      </div>
      <div id="logsBody">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <script src="../../packages/ui-kit/components/communication-buttons.html"></script>
  <script>
    const allLogs = [
      {time:new Date(Date.now()-120000),app:'CRM',action:'Create Contact',details:'Added: John Doe (john@example.com)',status:'success'},
      {time:new Date(Date.now()-300000),app:'Messaging',action:'Send SMS',details:'To: +1234567890 - "Welcome to our service!"',status:'success'},
      {time:new Date(Date.now()-600000),app:'Booking',action:'Cancel Appointment',details:'Booking #1234 - Customer request',status:'success'},
      {time:new Date(Date.now()-3600000),app:'CRM',action:'Update Contact',details:'Updated: Jane Smith',status:'failed'},
      {time:new Date(Date.now()-7200000),app:'Messaging',action:'Send Email',details:'To: customer@example.com',status:'success'},
      {time:new Date(Date.now()-10800000),app:'Booking',action:'Create Booking',details:'Service: Haircut - $50',status:'success'}
    ];

    function renderLogs() {
      const tbody = document.getElementById('logsBody');
      
      if (allLogs.length === 0) {
        tbody.innerHTML = '<div class="empty">No actions recorded yet</div>';
        return;
      }

      tbody.innerHTML = allLogs.map(log => `
        <div class="log-row">
          <div class="time">${formatTime(log.time)}</div>
          <div class="app-name">${log.app}</div>
          <div class="action-name">${log.action}</div>
          <div style="font-size:13px;color:#666">${log.details}</div>
          <div>
            <span class="status-badge ${log.status}">
              ${log.status === 'success' ? '✓' : '✗'} ${log.status}
            </span>
          </div>
        </div>
      `).join('');
    }

    function formatTime(date) {
      const now = new Date();
      const diff = now - date;
      const minutes = Math.floor(diff / 60000);
      const hours = Math.floor(minutes / 60);
      
      if (minutes < 1) return 'Just now';
      if (minutes < 60) return `${minutes}m ago`;
      if (hours < 24) return `${hours}h ago`;
      return date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
    }

    function filterLogs() {
      // Filtering logic here
      renderLogs();
    }

    renderLogs();
    // Auto-refresh every 10 seconds
    setInterval(renderLogs, 10000);
  </script>
</body>
</html>
