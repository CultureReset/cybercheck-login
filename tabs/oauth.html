<!-- Connections Tab — rendered by js/oauth.js (loadConnections) -->
<div style="max-width:900px;margin:0 auto;padding:0 4px;">

  <div style="margin-bottom:28px;">
    <h2 style="font-size:22px;font-weight:700;color:var(--text);margin:0 0 6px;">Connections</h2>
    <p style="font-size:14px;color:var(--text-muted);margin:0;">Connect your payment processor and other tools.</p>
  </div>

  <!-- Stripe Connect -->
  <div style="background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius-lg);padding:28px;margin-bottom:20px;">
    <div id="stripe-settings">
      <div style="display:flex;align-items:center;gap:12px;padding:20px 0;">
        <div style="width:32px;height:32px;border-radius:50%;border:3px solid var(--primary);border-top-color:transparent;animation:spin 0.8s linear infinite;"></div>
        <span style="color:var(--text-muted);font-size:14px;">Loading Stripe status…</span>
      </div>
    </div>
  </div>

  <!-- Square Payments -->
  <div style="background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius-lg);padding:28px;margin-bottom:20px;">
    <div id="square-settings">
      <div style="display:flex;align-items:center;gap:12px;padding:20px 0;">
        <div style="width:32px;height:32px;border-radius:50%;border:3px solid var(--primary);border-top-color:transparent;animation:spin 0.8s linear infinite;"></div>
        <span style="color:var(--text-muted);font-size:14px;">Loading Square status…</span>
      </div>
    </div>
  </div>

  <!-- Active Processor Selector -->
  <div style="background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius-lg);padding:28px;margin-bottom:20px;">
    <div id="active-processor-section">
      <div style="color:var(--text-muted);font-size:13px;">Loading…</div>
    </div>
  </div>

  <!-- Google -->
  <div style="background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius-lg);padding:28px;margin-bottom:20px;">
    <h3 style="font-size:15px;font-weight:600;color:var(--text);margin:0 0 16px;">Google</h3>
    <div id="google-connections">
      <div style="color:var(--text-muted);font-size:13px;">Loading…</div>
    </div>
  </div>

  <!-- Social Media -->
  <div style="background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius-lg);padding:28px;">
    <h3 style="font-size:15px;font-weight:600;color:var(--text);margin:0 0 16px;">Social Media</h3>
    <div id="social-connections">
      <div style="color:var(--text-muted);font-size:13px;">Loading…</div>
    </div>
  </div>

</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
.oauth-card {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid var(--card-border);
}
.oauth-card:last-child { border-bottom: none; }
.provider-icon {
  width: 40px;
  height: 40px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  flex-shrink: 0;
}
.provider-info { flex: 1; min-width: 0; }
.provider-info h4 { font-size: 14px; font-weight: 600; color: var(--text); margin: 0 0 2px; }
.provider-info p { font-size: 12px; color: var(--text-muted); margin: 0; }
</style>
