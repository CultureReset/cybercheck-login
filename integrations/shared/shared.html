<!--
  SHARED: Base styles + utilities required by ALL components
  Add this ONCE to any page that uses components
  Place inside <head> for styles, before </body> for script
-->

<style id="comp-shared-styles">
/* Overlay + Modal base */
.comp-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
    overflow-y: auto;
    padding: 20px;
    -webkit-overflow-scrolling: touch;
}
.comp-overlay.open { display: block; }

.comp-modal {
    background: #fff;
    border-radius: 16px;
    max-width: 680px;
    margin: 0 auto;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

.comp-modal-header {
    padding: 18px 20px;
    border-bottom: 1px solid #eee;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    background: #fff;
    z-index: 10;
}
.comp-modal-header h2 { font-size: 1.2rem; font-weight: 700; }

.comp-close {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: none;
    background: #f0f0f0;
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #555;
    flex-shrink: 0;
}
.comp-close:hover { background: #ddd; }

/* Section label */
.comp-section-label {
    padding: 12px 20px 6px;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #999;
    border-bottom: 1px solid #f5f5f5;
    background: #fafafa;
}

/* Item with image */
.comp-item-img {
    padding: 14px 20px;
    border-bottom: 1px solid #f5f5f5;
    display: flex;
    gap: 14px;
    align-items: flex-start;
}
.comp-item-img:last-child { border-bottom: none; }

.comp-item-thumb {
    width: 72px; height: 72px;
    border-radius: 10px;
    object-fit: cover;
    flex-shrink: 0;
    background: #f0f0f0;
}
.comp-item-thumb-placeholder {
    width: 72px; height: 72px;
    border-radius: 10px;
    background: #f0f0f0;
    flex-shrink: 0;
}
.comp-item-body { flex: 1; min-width: 0; }

/* Item list (no image) */
.comp-item-list {
    padding: 14px 20px;
    border-bottom: 1px solid #f5f5f5;
}
.comp-item-list:last-child { border-bottom: none; }

/* Shared item parts */
.comp-item-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
}
.comp-item-name { font-size: 0.95rem; font-weight: 600; color: #111; line-height: 1.3; }
.comp-item-price { font-size: 0.95rem; font-weight: 700; color: #111; white-space: nowrap; }
.comp-item-desc { font-size: 0.82rem; color: #888; margin-top: 4px; line-height: 1.4; }

/* Link buttons */
.link-btn {
    display: block;
    width: 100%;
    padding: 16px 20px;
    border: none;
    background: #fff;
    text-align: left;
    font-size: 1rem;
    font-weight: 600;
    color: #111;
    cursor: pointer;
    border-bottom: 1px solid #f0f0f0;
    transition: background 0.15s;
}
.link-btn:hover { background: #f9f9f9; }
</style>

<script id="comp-shared-script">
// Open/close any component overlay
function openComponent(id) {
    document.getElementById('comp-' + id).classList.add('open');
    document.body.style.overflow = 'hidden';
}
function closeComponent(id) {
    document.getElementById(id).classList.remove('open');
    document.body.style.overflow = '';
}

// Close on overlay background click
document.addEventListener('click', function(e) {
    if (e.target.classList.contains('comp-overlay')) {
        e.target.classList.remove('open');
        document.body.style.overflow = '';
    }
});

// Shared escape utilities
function escapeHtml(text) {
    if (!text) return '';
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
}
function escapeAttr(text) {
    if (!text) return '';
    return text.replace(/"/g, '&quot;');
}
</script>
