<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Your Tools - CyberCheck</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }

    .navbar {
      background: white;
      border-bottom: 1px solid #e0e0e0;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .header {
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 32px;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .header p {
      color: #666;
      font-size: 16px;
    }

    .search-filter-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 300px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      transition: all 0.2s;
    }

    .search-box input:focus {
      outline: none;
      border-color: #667eea;
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
    }

    .filter-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 10px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 20px;
      background: white;
      color: #666;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .chip:hover {
      border-color: #667eea;
      color: #667eea;
    }

    .chip.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-color: transparent;
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }

    .tool-card {
      background: white;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      padding: 24px;
      transition: all 0.3s;
      cursor: pointer;
    }

    .tool-card:hover {
      border-color: #667eea;
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }

    .tool-card.selected {
      border-color: #10b981;
      background: #f0fdf4;
    }

    .tool-header {
      display: flex;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .tool-icon {
      font-size: 40px;
      margin-right: 16px;
    }

    .tool-info {
      flex: 1;
    }

    .tool-name {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .tool-category {
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tool-desc {
      color: #666;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .tool-features {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }

    .feature-tag {
      padding: 4px 8px;
      background: #f0f0f0;
      border-radius: 4px;
      font-size: 12px;
      color: #666;
    }

    .tool-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      border-top: 1px solid #e0e0e0;
    }

    .btn-add {
      padding: 10px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-add:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-added {
      padding: 10px 20px;
      background: #10b981;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .selected-count {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      min-width: 300px;
      z-index: 100;
    }

    .selected-count h3 {
      font-size: 18px;
      margin-bottom: 12px;
      color: #1a1a1a;
    }

    .selected-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
      max-height: 150px;
      overflow-y: auto;
    }

    .selected-item {
      padding: 6px 12px;
      background: #f0f0f0;
      border-radius: 20px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-continue {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-continue:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }

    @media (max-width: 768px) {
      .tools-grid {
        grid-template-columns: 1fr;
      }

      .selected-count {
        left: 16px;
        right: 16px;
        bottom: 16px;
        min-width: auto;
      }
    }
  </style>
</head>
<body>
<script src="../../packages/ui-kit/components/universal-nav.html"></script>
  <script src="../../packages/ui-kit/components/hamburger-nav.html"></script>
  <div class="navbar">
    <div class="logo">🔐 CyberCheck</div>
    <div style="color: #666; font-size: 14px;">Step 2 of 3</div>
  </div>

  <div class="container">
    <div class="header">
      <h1>Choose Your Tools</h1>
      <p>Select the tools and platforms you want to use with your business</p>
    </div>

    <div class="search-filter-bar">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search tools..." onkeyup="searchTools()">
      </div>
    </div>

    <div class="filter-chips">
      <div class="chip active" onclick="filterCategory('all')">All Tools</div>
      <div class="chip" onclick="filterCategory('payments')">Payments</div>
      <div class="chip" onclick="filterCategory('social')">Social Media</div>
      <div class="chip" onclick="filterCategory('analytics')">Analytics</div>
      <div class="chip" onclick="filterCategory('marketing')">Marketing</div>
      <div class="chip" onclick="filterCategory('communication')">Communication</div>
    </div>

    <div class="tools-grid" id="toolsGrid"></div>
  </div>

  <div class="selected-count" id="selectedPanel" style="display: none;">
    <h3>Selected Tools (<span id="selectedCount">0</span>)</h3>
    <div class="selected-list" id="selectedList"></div>
    <button class="btn-continue" onclick="continueToConnection()">
      Continue to Connection →
    </button>
  </div>

  <script>
    const tools = [
      {
        id: 'stripe',
        name: 'Stripe',
        icon: '💳',
        category: 'payments',
        description: 'Accept online payments, manage subscriptions, and handle billing for your business.',
        features: ['Online Payments', 'Subscriptions', 'Invoicing']
      },
      {
        id: 'square',
        name: 'Square',
        icon: '⬛',
        category: 'payments',
        description: 'Complete POS system with payment processing, inventory management, and sales tracking.',
        features: ['POS System', 'Inventory', 'Sales Reports']
      },
      {
        id: 'instagram',
        name: 'Instagram',
        icon: '📸',
        category: 'social',
        description: 'Display your Instagram feed, manage posts, and engage with your followers directly.',
        features: ['Feed Display', 'Post Management', 'Analytics']
      },
      {
        id: 'facebook',
        name: 'Facebook',
        icon: '📘',
        category: 'social',
        description: 'Sync your Facebook page, manage posts, and track engagement metrics.',
        features: ['Page Management', 'Post Scheduling', 'Insights']
      },
      {
        id: 'google-analytics',
        name: 'Google Analytics',
        icon: '📊',
        category: 'analytics',
        description: 'Track website traffic, user behavior, and conversion rates with detailed analytics.',
        features: ['Traffic Tracking', 'User Behavior', 'Conversions']
      },
      {
        id: 'google-calendar',
        name: 'Google Calendar',
        icon: '📅',
        category: 'analytics',
        description: 'Manage appointments, bookings, and schedules with calendar integration.',
        features: ['Appointments', 'Booking System', 'Reminders']
      },
      {
        id: 'mailchimp',
        name: 'Mailchimp',
        icon: '📧',
        category: 'marketing',
        description: 'Create and send email campaigns, manage subscriber lists, and track email performance.',
        features: ['Email Campaigns', 'Automation', 'List Management']
      },
      {
        id: 'twilio',
        name: 'Twilio',
        icon: '💬',
        category: 'communication',
        description: 'Send SMS messages, notifications, and reminders to your customers automatically.',
        features: ['SMS Messages', 'Notifications', 'Automation']
      }
    ];

    let selectedTools = new Set();
    let currentCategory = 'all';

    function renderTools() {
      const grid = document.getElementById('toolsGrid');
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();

      let filteredTools = tools.filter(tool => {
        const matchesCategory = currentCategory === 'all' || tool.category === currentCategory;
        const matchesSearch = tool.name.toLowerCase().includes(searchTerm) ||
                              tool.description.toLowerCase().includes(searchTerm);
        return matchesCategory && matchesSearch;
      });

      grid.innerHTML = filteredTools.map(tool => `
        <div class="tool-card ${selectedTools.has(tool.id) ? 'selected' : ''}" onclick="toggleTool('${tool.id}')">
          <div class="tool-header">
            <div class="tool-icon">${tool.icon}</div>
            <div class="tool-info">
              <div class="tool-name">${tool.name}</div>
              <div class="tool-category">${tool.category}</div>
            </div>
          </div>
          <div class="tool-desc">${tool.description}</div>
          <div class="tool-features">
            ${tool.features.map(f => `<span class="feature-tag">${f}</span>`).join('')}
          </div>
          <div class="tool-footer">
            <div style="font-size: 12px; color: #999;">Free to connect</div>
            ${selectedTools.has(tool.id) ?
              '<div class="btn-added">✓ Added</div>' :
              '<button class="btn-add">Add Tool</button>'}
          </div>
        </div>
      `).join('');
    }

    function toggleTool(toolId) {
      if (selectedTools.has(toolId)) {
        selectedTools.delete(toolId);
      } else {
        selectedTools.add(toolId);
      }
      updateSelectedPanel();
      renderTools();
    }

    function updateSelectedPanel() {
      const panel = document.getElementById('selectedPanel');
      const count = document.getElementById('selectedCount');
      const list = document.getElementById('selectedList');

      count.textContent = selectedTools.size;

      if (selectedTools.size > 0) {
        panel.style.display = 'block';
        list.innerHTML = Array.from(selectedTools).map(toolId => {
          const tool = tools.find(t => t.id === toolId);
          return `<div class="selected-item">${tool.icon} ${tool.name}</div>`;
        }).join('');
      } else {
        panel.style.display = 'none';
      }
    }

    function filterCategory(category) {
      currentCategory = category;

      // Update active chip
      document.querySelectorAll('.chip').forEach(chip => {
        chip.classList.remove('active');
      });
      event.target.classList.add('active');

      renderTools();
    }

    function searchTools() {
      renderTools();
    }

    function continueToConnection() {
      if (selectedTools.size > 0) {
        sessionStorage.setItem('selectedTools', JSON.stringify([...selectedTools]));
        window.location.href = 'connection-manager.html';
      } else {
        alert('Please select at least one tool to continue');
      }
    }

    // Initialize
    renderTools();
  </script>
</body>
</html>
